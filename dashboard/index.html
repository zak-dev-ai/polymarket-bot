<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEXUS TRADING TERMINAL</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
 --bg:#020608;--bg1:#060d10;--bg2:#091318;--bg3:#0d1c24;
 --border:#0f2d3a;--border2:#1a4055;
 --cyan:#00e5ff;--cyan2:#00b8cc;
 --green:#00ff88;--green2:#00cc6a;
 --red:#ff3355;--red2:#cc2244;
 --amber:#ffaa00;--purple:#aa55ff;
 --white:#e8f4f8;--muted:#3a6070;--muted2:#1f3d4d;
 --font-mono:'Share Tech Mono',monospace;
 --font-ui:'Rajdhani',sans-serif;
 --font-head:'Orbitron',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--font-ui);}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.012) 2px,rgba(0,229,255,0.012) 4px);pointer-events:none;z-index:9999;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.65) 100%);pointer-events:none;z-index:9998;}

.topbar{display:flex;align-items:center;height:34px;background:var(--bg1);border-bottom:1px solid var(--border2);padding:0 12px;position:relative;overflow:hidden;}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),var(--cyan),transparent);animation:scan 4s linear infinite;}
@keyframes scan{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.logo{font-family:var(--font-head);font-size:12px;color:var(--cyan);letter-spacing:4px;margin-right:20px;text-shadow:0 0 12px var(--cyan);animation:glitch 7s ease infinite;flex-shrink:0;}
@keyframes glitch{0%,89%,100%{text-shadow:0 0 12px var(--cyan);}90%{text-shadow:3px 0 0 var(--red),-3px 0 0 var(--green);}92%{text-shadow:-2px 0 0 var(--red),2px 0 0 var(--green);}94%{text-shadow:0 0 12px var(--cyan);}}
.ticker-strip{flex:1;overflow:hidden;display:flex;align-items:center;height:100%;}
.ticker-inner{display:flex;animation:ticker 35s linear infinite;white-space:nowrap;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick{display:flex;align-items:center;gap:6px;padding:0 14px;font-family:var(--font-mono);font-size:10px;border-right:1px solid var(--border);}
.tick-sym{color:var(--muted);font-size:9px;}
.up{color:var(--green);}.dn{color:var(--red);}
.topright{display:flex;align-items:center;gap:12px;flex-shrink:0;margin-left:12px;}
.livebadge{display:flex;align-items:center;gap:5px;font-size:9px;font-family:var(--font-mono);background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.25);padding:2px 8px;color:var(--green);}
.livebadge .dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
.clock{font-family:var(--font-mono);font-size:12px;color:var(--cyan);letter-spacing:2px;}

.grid{display:grid;grid-template-columns:192px 1fr 228px;grid-template-rows:1fr 172px;height:calc(100vh - 34px);gap:1px;background:var(--border);}
.panel{background:var(--bg1);overflow:hidden;position:relative;}
.ph{display:flex;align-items:center;justify-content:space-between;padding:5px 9px;background:var(--bg2);border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0;}
.ph .t{color:var(--cyan2);font-size:8px;letter-spacing:2px;}
.ph .b{font-size:8px;padding:1px 5px;background:rgba(0,229,255,0.08);border:1px solid var(--border2);color:var(--cyan);}

/* LEFT */
.left{grid-row:1/3;display:flex;flex-direction:column;}
.sb{padding:7px 9px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.sv{font-family:var(--font-mono);font-size:22px;line-height:1;}
.sv.big{font-family:var(--font-head);font-size:20px;}
.sv.c{color:var(--cyan);}
.sv.g{color:var(--green);text-shadow:0 0 10px rgba(0,255,136,0.35);}
.sv.r{color:var(--red);text-shadow:0 0 10px rgba(255,51,85,0.35);}
.ss{font-size:8px;color:var(--muted);margin-top:2px;font-family:var(--font-mono);}
.sb2{display:grid;grid-template-columns:1fr 1fr;}
.sb2 .h{padding-right:7px;border-right:1px solid var(--border);}
.sb2 .h2{padding-left:7px;}
.agrow{display:flex;align-items:center;justify-content:space-between;padding:4px 9px;border-bottom:1px solid var(--border);flex-shrink:0;}
.agname{font-family:var(--font-mono);font-size:8px;color:var(--muted);}
.agst{font-size:8px;font-family:var(--font-mono);padding:1px 4px;}
.agst.running{color:var(--green);background:rgba(0,255,136,0.07);border:1px solid rgba(0,255,136,0.18);}
.agst.idle{color:var(--muted);background:var(--muted2);border:1px solid var(--border);}
.agst.error{color:var(--red);background:rgba(255,51,85,0.07);border:1px solid rgba(255,51,85,0.18);}
.agst.paused{color:var(--amber);background:rgba(255,170,0,0.07);border:1px solid rgba(255,170,0,0.18);}
.ctrls{padding:7px 9px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;}
.btn{width:100%;padding:4px 8px;font-family:var(--font-mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid;background:transparent;transition:all 0.12s;text-align:center;}
.btn-g{color:var(--green);border-color:rgba(0,255,136,0.35);}
.btn-g:hover{background:rgba(0,255,136,0.09);box-shadow:0 0 8px rgba(0,255,136,0.15);}
.btn-r{color:var(--red);border-color:rgba(255,51,85,0.35);}
.btn-r:hover{background:rgba(255,51,85,0.09);}
.btn-c{color:var(--cyan);border-color:rgba(0,229,255,0.35);}
.btn-c:hover{background:rgba(0,229,255,0.09);}
.hb{padding:5px 9px;font-family:var(--font-mono);font-size:8px;color:var(--muted);flex-shrink:0;}
.smsg{padding:0 9px 6px;font-family:var(--font-mono);font-size:8px;color:var(--cyan);line-height:1.4;flex-shrink:0;}

/* CENTER */
.ctop{grid-column:2;grid-row:1;display:flex;flex-direction:column;}
.sigbars{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border);flex-shrink:0;}
.sigbar{background:var(--bg2);padding:5px 6px;text-align:center;position:relative;overflow:hidden;}
.sigbar::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--muted2);}
.sigbar .bfill{position:absolute;bottom:0;left:0;height:2px;transition:width 0.6s ease,background 0.3s;}
.sigbar .sn{font-size:8px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;}
.sigbar .sv2{font-family:var(--font-mono);font-size:12px;margin-top:2px;}
.chartarea{flex:1;min-height:0;background:var(--bg1);position:relative;padding:4px 8px;}
.chartlabels{position:absolute;top:6px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:flex-start;z-index:2;pointer-events:none;}
.casset{font-family:var(--font-head);font-size:10px;color:var(--cyan);letter-spacing:2px;}
.csub{font-size:8px;color:var(--muted);font-family:var(--font-mono);margin-top:2px;}
.cprice{font-family:var(--font-mono);font-size:18px;}
.cchg{font-family:var(--font-mono);font-size:9px;padding:1px 5px;margin-top:2px;display:inline-block;}
.tradeticker{background:var(--bg2);border-top:1px solid var(--border);overflow:hidden;height:24px;display:flex;align-items:center;flex-shrink:0;}
.ttinner{display:flex;animation:ticker 22s linear infinite;white-space:nowrap;}
.titem{display:flex;align-items:center;gap:6px;padding:0 12px;border-right:1px solid var(--border);font-family:var(--font-mono);font-size:9px;}

/* RIGHT */
.right{grid-row:1/3;display:flex;flex-direction:column;}
.scangrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);flex-shrink:0;}
.sc{background:var(--bg2);padding:7px 8px;position:relative;overflow:hidden;}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc.hot::after{background:linear-gradient(90deg,var(--green),var(--cyan));}
.sc.warm::after{background:var(--amber);}
.sc.cold::after{background:var(--muted2);}
.sc-a{font-family:var(--font-head);font-size:9px;color:var(--cyan);letter-spacing:1px;}
.sc-r{font-family:var(--font-mono);font-size:18px;font-weight:700;line-height:1;margin:3px 0 1px;}
.sc-r.hot{color:var(--green);text-shadow:0 0 8px rgba(0,255,136,0.4);}
.sc-r.warm{color:var(--amber);}
.sc-r.cold{color:var(--muted);}
.sc-s{font-size:8px;font-family:var(--font-mono);}
.sc-p{font-size:7px;color:var(--muted);margin-top:2px;font-family:var(--font-mono);}
.sc-e{position:absolute;bottom:4px;right:6px;font-size:7px;font-family:var(--font-mono);padding:1px 3px;}
.sc-e.combined{color:var(--green);border:1px solid rgba(0,255,136,0.25);}
.sc-e.payout_ratio{color:var(--cyan);border:1px solid rgba(0,229,255,0.25);}
.sc-e.chainlink_lag{color:var(--amber);border:1px solid rgba(255,170,0,0.25);}
.sc-e.none{color:var(--muted);border:1px solid var(--border);}
.obrow{display:grid;grid-template-columns:1fr auto auto;padding:3px 9px;font-family:var(--font-mono);font-size:9px;border-bottom:1px solid rgba(15,45,58,0.4);position:relative;}
.obrow::before{content:'';position:absolute;inset:0;right:auto;opacity:0.12;}
.obrow.bid::before{background:var(--green);}
.obrow.ask::before{background:var(--red);}
.obrow .om{color:var(--muted);font-size:8px;}
.obrow .os.bid{color:var(--green);}
.obrow .os.ask{color:var(--red);}
.obrow .op{color:var(--amber);text-align:right;}
.alfeed{overflow-y:auto;flex:1;}
.alitem{padding:4px 9px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:8px;line-height:1.5;animation:rowIn 0.3s ease;}
.alitem .ald{margin-right:4px;}
.alitem.info .ald{color:var(--cyan);}
.alitem.warning .ald{color:var(--amber);}
.alitem.critical .ald{color:var(--red);animation:blink 0.4s ease infinite;}
.almsg{color:#7aabb8;}
.altime{color:var(--muted);font-size:7px;margin-top:1px;}

@keyframes rowIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
::selection{background:var(--cyan);color:var(--bg);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg1);}
::-webkit-scrollbar-thumb{background:var(--border2);}
</style>
</head>

<script>
const SUPABASE_URL = 'https://jkoxrftlslylfmugjomd.supabase.co'

const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
</script>

<div class="topbar">
  <div class="logo">◆ NEXUS</div>
  <div class="ticker-strip"><div class="ticker-inner" id="tickerStrip"></div></div>
  <div class="topright">
    <div class="livebadge"><span class="dot"></span><span id="liveLabel">LIVE</span></div>
    <div class="clock" id="clock"></div>
  </div>
</div>

<div class="grid">
  <!-- LEFT -->
  <div class="left">
    <div class="sb"><div class="sl">Bankroll</div><div class="sv big c" id="bankroll">$—</div><div class="ss" id="bankrollHint">started $10.00</div></div>
    <div class="sb sb2"><div class="h"><div class="sl">P&L</div><div class="sv" id="totalPnl">$—</div></div><div class="h2"><div class="sl">Win Rate</div><div class="sv" id="winRate">—%</div><div class="ss" id="winRateHint">0/0</div></div></div>
    <div class="sb"><div class="sl">Trades</div><div class="sv c" id="totalTrades">0</div></div>
    <div class="sb"><div class="sl">Best Edge</div><div class="sv g" id="bestEdge">—</div><div class="ss" id="bestEdgeAsset">—</div></div>
    <div class="ph" style="border-top:1px solid var(--border);margin-top:0;"><span class="t">AGENTS</span><span class="b">3</span></div>
    <div id="agentsList"></div>
    <div class="ctrls"><div class="btn btn-r" onclick="control('pause')">⏹ PAUSE</div><div class="btn btn-g" onclick="control('resume')">▶ RESUME</div><div class="btn btn-c" onclick="location.reload()">↻ REFRESH</div></div>
    <div class="hb" id="hbTime">—</div>
    <div class="smsg" id="statusMsg">Initialising...</div>
  </div>

  <!-- CENTER -->
  <div class="ctop panel">
    <div class="sigbars" id="sigBars"></div>
    <div class="chartarea">
      <div class="chartlabels"><div><div class="casset" id="chartAsset">BTC/USD</div><div class="csub" id="chartSub">Polymarket</div></div><div style="text-align:right"><div class="cprice" id="chartPrice">—</div><div class="cchg" id="chartChg" style="background:var(--muted2);color:var(--muted)">—</div></div></div>
      <canvas id="pnlChart" style="width:100%;height:100%"></canvas>
    </div>
    <div class="tradeticker"><div class="ttinner" id="tradeTicker"></div></div>
  </div>

  <!-- RIGHT -->
  <div class="right panel">
    <div class="scangrid" id="scanGrid"></div>
    <div class="ph" style="border-top:1px solid var(--border);"><span class="t">ORDER BOOK</span><span class="b">SPOT</span></div>
    <div id="orderBook"></div>
    <div class="ph"><span class="t">ALERTS</span><span class="b" id="alertCount">0</span></div>
    <div class="alfeed" id="alertFeed"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────
let pnlChart = null
const $ = id => document.getElementById(id)
const fmt = (n,d=2) => (n??0).toFixed(d)
const fmtTime = ts => new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})
const timeAgo = ts => {const s=Math.floor((Date.now()-new Date(ts))/1000);return s<60?s+'s':s<3600?Math.floor(s/60)+'m':Math.floor(s/3600)+'h'}
const pnlCol = v => v>0?'var(--green)':v<0?'var(--red)':'var(--muted)'

function clockTick(){const d=new Date();$('clock').textContent=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}
setInterval(clockTick,1000);clockTick()

// ── Ticker ─────────────────────────────────────────────────
function buildTicker(){
  let html='';const items=[['BTC',79500],['BNB',62700],['ETH',3100],['SOL',145],['DOGE',0.16],['AAPL',198],['TSLA',265],['NVDA',880],['MSTR',1450],['SPX',5432],['VIX',14.5],['OI',39800]]
  for(let r=0;r<2;r++)items.forEach(t=>{const chg=(Math.random()-0.5)*2;html+=`<div class="tick"><span class="tick-sym">${t[0]}</span><span>$${t[1].toLocaleString()}</span><span class="${chg>0?'up':'dn'}">${chg>0?'+':''}${chg.toFixed(2)}%</span></div>`})
  $('tickerStrip').innerHTML=html
}
buildTicker();setInterval(buildTicker,5000)

// ── Signal Bars ────────────────────────────────────────────
function renderSigBars(signals){
  const assets=['BNBUSD','BTCUSD','ETHUSD','RNDR','SOL','LINK']
  let html=''
  assets.forEach(a=>{
    const s=signals?.find(x=>(x.market_id||'').includes(a))
    const score=s?Math.abs(s.net_score||0):0
    const col=score>=3.5?'var(--green)':score>=2?'var(--amber)':'var(--muted2)'
    const pct=Math.min(100,score*14)
    html+=`<div class="sigbar"><div class="bfill" style="width:${pct}%;background:${col}"></div><div class="sn">${a}</div><div class="sv2" style="color:${col}">${s?score.toFixed(1)+'x':'—'}</div></div>`
  })
  $('sigBars').innerHTML=html
}

// ── Scan Grid ──────────────────────────────────────────────
function renderScanGrid(signals){
  const assets=[{a:'BNBUSD',n:'BNB/USD'},{a:'BTCUSD',n:'BTC/USD'},{a:'ETHUSD',n:'ETH/USD'}]
  let html='';const now=Date.now()
  assets.forEach(({a,n})=>{
    const s=signals?.find(x=>(x.market_id||'').includes(a))
    const score=s?Math.abs(s.net_score||0):0
    const isTradeable=s?.tradeable
    const cls=isTradeable?'hot':score>=2?'warm':'cold'
    const edgeType=s?.edge_type||'none'
    const dir=s?.direction||'—'
    html+=`<div class="sc ${cls}"><div class="sc-a">${n}</div><div class="sc-r ${cls}">${s?score.toFixed(2)+'x':'—'}</div><div class="sc-s">${s?dir+' | '+(s.confidence||'—'):'waiting'}</div><div class="sc-p">${s?timeAgo(s.ts)+' ago':''}</div><span class="sc-e ${edgeType}">${edgeType.replace('_',' ')}</span></div>`
  })
  $('scanGrid').innerHTML=html
}

// ── Order Book ─────────────────────────────────────────────
function renderOrderBook(){/* Placeholder — real OB requires WS */}
  const bids=[['62745',12.5,62745*12.5],['62740',28.1],['62735',45.3]]
  const asks=[['62755',8.2],['62760',15.7],['62765',22.4]]
  $('orderBook').innerHTML='<div class="ph" style="border:none;background:transparent;padding:2px 9px"><span style="font-family:var(--font-mono);font-size:8px;color:var(--muted)">BID</span><span></span><span style="font-family:var(--font-mono);font-size:8px;color:var(--muted)">ASK</span></div>'+
    [...Array(5)].map((_,i)=>{
      const b=bids[i]||['—',0];const a=asks[i]||['—',0]
      return `<div style="display:grid;grid-template-columns:1fr auto auto;padding:2px 9px;font-family:var(--font-mono);font-size:8px"><span style="color:var(--green)">${b[0]}</span><span style="color:var(--muted)">${b[1]}</span><span style="color:var(--red);text-align:right">${a[0]}</span></div>`
    }).join('')

// ── Trade Ticker ───────────────────────────────────────────
function renderTradeTicker(trades){
  if(!trades||!trades.length){$('tradeTicker').innerHTML='';return}
  const html=trades.map(t=>`<div class="titem"><span style="color:${['YES','UP','Bull'].includes(t.side)?'var(--green)':'var(--red)'}">${t.side||'—'}</span><span>$${fmt(t.size_usdc)}</span><span style="color:var(--muted)">${(t.market_id||'').slice(0,6)}</span></div>`).join('')
  // Duplicate for seamless scroll
  $('tradeTicker').innerHTML=html+html
}

// ── Bot Controls ───────────────────────────────────────────
async function control(action){
  try{await fetch('https://dashboard.zak-dev-ai.deno.net/'+action,{method:'POST'})}catch(e){}
  setTimeout(loadAll,2000)
}

// ── Load & Render ─────────────────────────────────────────
async function loadAll(){
  try{
    const [state, trades, signals, alerts, agents] = await Promise.all([
      db.from('bot_state').select('*').eq('id',1).single(),
      db.from('trades').select('*').order('ts',{ascending:false}).limit(20),
      db.from('signals').select('*').order('ts',{ascending:false}).limit(50),
      db.from('alerts').select('*').order('ts',{ascending:false}).limit(30),
      db.from('agent_status').select('*')
    ])
    if(state.data)renderState(state.data)
    if(trades.data){renderTradeTicker(trades.data);updatePnlChart(trades.data)}
    if(signals.data){renderSigBars(signals.data);renderScanGrid(signals.data)}
    if(alerts.data)renderAlerts(alerts.data)
    if(agents.data)renderAgents(agents.data)
  }catch(e){$('statusMsg').textContent='DB Error: '+e.message}
}

function renderState(s){
  $('bankroll').textContent='$'+fmt(s.current_bankroll)
  $('bankrollHint').textContent='started $'+fmt(s.bankroll)
  const pnl=s.total_pnl??0
  $('totalPnl').textContent=(pnl>=0?'+':'')+'$'+fmt(pnl)
  $('totalPnl').style.color=pnlCol(pnl)
  const wr=s.total_trades>0?((s.total_wins/s.total_trades)*100).toFixed(1):'—'
  $('winRate').textContent=wr+'%'
  $('winRateHint').textContent=(s.total_wins||0)+'/'+(s.total_trades||0)
  $('totalTrades').textContent=s.total_trades||0
  $('statusMsg').textContent=s.status_message||'—'
  $('hbTime').textContent=s.last_heartbeat?timeAgo(s.last_heartbeat)+' ago':'—'
}

function renderAlerts(alerts){
  if(!alerts.length){$('alertFeed').innerHTML='<div style="padding:9px;font-family:var(--font-mono);font-size:8px;color:var(--muted)">No alerts</div>';$('alertCount').textContent='0';return}
  $('alertCount').textContent=alerts.length
  $('alertFeed').innerHTML=alerts.slice(0,25).map(a=>`<div class="alitem ${a.level||'info'}"><span class="ald">●</span><span class="almsg">${a.message}</span><div class="altime">${timeAgo(a.ts)}</div></div>`).join('')
}

function renderAgents(agents){
  if(!agents.length){$('agentsList').innerHTML='<div class="agrow"><span class="agname">—</span></div>';return}
  $('agentsList').innerHTML=agents.map(a=>`<div class="agrow"><span class="agname">${a.agent_name||'bot'}</span><span class="agst ${a.status||'idle'}">${a.status||'—'}</span></div>`).join('')
}

// ── P&L Chart ──────────────────────────────────────────────
function updatePnlChart(trades){
  const canvas=$('pnlChart')
  const closed=trades.filter(t=>t.pnl!==null).reverse()
  if(!closed.length){if(pnlChart){pnlChart.destroy();pnlChart=null}return}
  let cum=0;const values=closed.map(t=>{cum+=t.pnl;return parseFloat(cum.toFixed(2))})
  const labels=closed.map(t=>fmtTime(t.ts))
  if(pnlChart){pnlChart.data.labels=labels;pnlChart.data.datasets[0].data=values;pnlChart.update('none');return}
  pnlChart=new Chart(canvas,{type:'line',data:{labels,datasets:[{data:values,backgroundColor:'rgba(0,229,255,0.03)',borderColor:'#00e5ff',borderWidth:1.2,pointRadius:0,tension:0.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+ctx.parsed.y.toFixed(2)}}},scales:{x:{ticks:{color:'#1f3d4d',font:{size:8}},grid:{display:false}},y:{ticks:{color:'#1f3d4d',font:{size:8},callback:v=>'$'+v.toFixed(1)},grid:{color:'#0f2d3a'}}}}})
}

// ── Boot ───────────────────────────────────────────────────
$('chartAsset').textContent='BNB/USD'
$('chartSub').textContent='PancakeSwap'
loadAll()
setInterval(loadAll, 15000)
</script>
