<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEXUS TRADING TERMINAL</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
 --bg:#020608;--bg1:#060d10;--bg2:#091318;--bg3:#0d1c24;
 --border:#0f2d3a;--border2:#1a4055;
 --cyan:#00e5ff;--cyan2:#00b8cc;
 --green:#00ff88;--green2:#00cc6a;
 --red:#ff3355;--red2:#cc2244;
 --amber:#ffaa00;--purple:#aa55ff;
 --white:#e8f4f8;--muted:#3a6070;--muted2:#1f3d4d;
 --font-mono:'Share Tech Mono',monospace;
 --font-ui:'Rajdhani',sans-serif;
 --font-head:'Orbitron',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--font-ui);}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.012) 2px,rgba(0,229,255,0.012) 4px);pointer-events:none;z-index:9999;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.65) 100%);pointer-events:none;z-index:9998;}

.topbar{display:flex;align-items:center;height:34px;background:var(--bg1);border-bottom:1px solid var(--border2);padding:0 12px;position:relative;overflow:hidden;}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),var(--cyan),transparent);animation:scan 4s linear infinite;}
@keyframes scan{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.logo{font-family:var(--font-head);font-size:12px;color:var(--cyan);letter-spacing:4px;margin-right:20px;text-shadow:0 0 12px var(--cyan);animation:glitch 7s ease infinite;flex-shrink:0;}
@keyframes glitch{0%,89%,100%{text-shadow:0 0 12px var(--cyan);}90%{text-shadow:3px 0 0 var(--red),-3px 0 0 var(--green);}92%{text-shadow:-2px 0 0 var(--red),2px 0 0 var(--green);}94%{text-shadow:0 0 12px var(--cyan);}}
.ticker-strip{flex:1;overflow:hidden;display:flex;align-items:center;height:100%;}
.ticker-inner{display:flex;animation:ticker 35s linear infinite;white-space:nowrap;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick{display:flex;align-items:center;gap:6px;padding:0 14px;font-family:var(--font-mono);font-size:10px;border-right:1px solid var(--border);}
.tick-sym{color:var(--muted);font-size:9px;}
.up{color:var(--green);}.dn{color:var(--red);}
.topright{display:flex;align-items:center;gap:12px;flex-shrink:0;margin-left:12px;}
.livebadge{display:flex;align-items:center;gap:5px;font-size:9px;font-family:var(--font-mono);background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.25);padding:2px 8px;color:var(--green);}
.livebadge .dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
.clock{font-family:var(--font-mono);font-size:12px;color:var(--cyan);letter-spacing:2px;}

.grid{display:grid;grid-template-columns:192px 1fr 228px;grid-template-rows:1fr 172px;height:calc(100vh - 34px);gap:1px;background:var(--border);}
.panel{background:var(--bg1);overflow:hidden;position:relative;}
.ph{display:flex;align-items:center;justify-content:space-between;padding:5px 9px;background:var(--bg2);border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0;}
.ph .t{color:var(--cyan2);font-size:8px;letter-spacing:2px;}
.ph .b{font-size:8px;padding:1px 5px;background:rgba(0,229,255,0.08);border:1px solid var(--border2);color:var(--cyan);}

.left{grid-row:1/3;display:flex;flex-direction:column;}
.sb{padding:7px 9px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.sv{font-family:var(--font-mono);font-size:22px;line-height:1;}
.sv.big{font-family:var(--font-head);font-size:20px;}
.sv.c{color:var(--cyan);}
.sv.g{color:var(--green);text-shadow:0 0 10px rgba(0,255,136,0.35);}
.sv.r{color:var(--red);text-shadow:0 0 10px rgba(255,51,85,0.35);}
.ss{font-size:8px;color:var(--muted);margin-top:2px;font-family:var(--font-mono);}
.sb2{display:grid;grid-template-columns:1fr 1fr;}
.sb2 .h{padding-right:7px;border-right:1px solid var(--border);}
.sb2 .h2{padding-left:7px;}
.agrow{display:flex;align-items:center;justify-content:space-between;padding:4px 9px;border-bottom:1px solid var(--border);flex-shrink:0;}
.agname{font-family:var(--font-mono);font-size:8px;color:var(--muted);}
.agst{font-size:8px;font-family:var(--font-mono);padding:1px 4px;}
.agst.running{color:var(--green);background:rgba(0,255,136,0.07);border:1px solid rgba(0,255,136,0.18);}
.agst.idle{color:var(--muted);background:var(--muted2);border:1px solid var(--border);}
.agst.error{color:var(--red);background:rgba(255,51,85,0.07);border:1px solid rgba(255,51,85,0.18);}
.agst.paused{color:var(--amber);background:rgba(255,170,0,0.07);border:1px solid rgba(255,170,0,0.18);}
.ctrls{padding:7px 9px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;}
.btn{width:100%;padding:4px 8px;font-family:var(--font-mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid;background:transparent;transition:all 0.12s;text-align:center;}
.btn-g{color:var(--green);border-color:rgba(0,255,136,0.35);}
.btn-g:hover{background:rgba(0,255,136,0.09);box-shadow:0 0 8px rgba(0,255,136,0.15);}
.btn-r{color:var(--red);border-color:rgba(255,51,85,0.35);}
.btn-r:hover{background:rgba(255,51,85,0.09);}
.btn-c{color:var(--cyan);border-color:rgba(0,229,255,0.35);}
.btn-c:hover{background:rgba(0,229,255,0.09);}
.hb{padding:5px 9px;font-family:var(--font-mono);font-size:8px;color:var(--muted);flex-shrink:0;}
.smsg{padding:0 9px 6px;font-family:var(--font-mono);font-size:8px;color:var(--cyan);line-height:1.4;flex-shrink:0;}

/* CENTER top — main signal area */
.center-top{display:flex;flex-direction:column;overflow:hidden;}
.signal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);margin:0;flex:1;}
.sig-card{background:var(--bg1);padding:7px 9px;display:flex;flex-direction:column;}
.sig-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.sig-asset{font-family:var(--font-mono);font-size:10px;color:var(--cyan);letter-spacing:1px;}
.sig-badge{font-size:7px;font-family:var(--font-mono);padding:1px 4px;border-radius:1px;}
.sig-badge.tradeable{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.25);}
.sig-badge.idle{background:var(--muted2);color:var(--muted);border:1px solid var(--border);}
.sig-payout{font-family:var(--font-mono);font-size:26px;}
.sig-detail{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px;font-family:var(--font-mono);font-size:8px;color:var(--muted);}
.sig-detail span{background:var(--bg2);padding:1px 4px;}
.sig-agree{font-size:8px;color:var(--muted);margin-top:2px;}

/* CENTER bottom — P&L chart */
.center-bottom{overflow:hidden;}
.center-bottom canvas{width:100%!important;height:100%!important;}

/* RIGHT top — trades */
.right-top{overflow-y:auto;display:flex;flex-direction:column;}
.tr{display:flex;align-items:center;padding:4px 8px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:8px;gap:4px;flex-wrap:wrap;}
.tr-time{color:var(--muted);width:36px;flex-shrink:0;}
.tr-asset{color:var(--cyan2);width:44px;flex-shrink:0;}
.tr-side{width:32px;flex-shrink:0;font-weight:600;}
.tr-side.YES,.tr-side.UP,.tr-side.Bull{color:var(--green);}
.tr-side.NO,.tr-side.DOWN,.tr-side.Bear{color:var(--red);}
.tr-size{color:var(--white);width:48px;flex-shrink:0;}
.tr-pnl{width:48px;flex-shrink:0;font-weight:600;}
.tr-pnl.pos{color:var(--green);}.tr-pnl.neg{color:var(--red);}
.tr-edge{color:var(--amber);width:36px;flex-shrink:0;}
.empty-t{display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--font-mono);font-size:9px;color:var(--muted);}

/* RIGHT bottom — alerts */
.right-bottom{overflow-y:auto;}
.al{display:flex;align-items:flex-start;gap:4px;padding:3px 8px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:8px;line-height:1.3;}
.al-time{color:var(--muted2);flex-shrink:0;width:28px;}
.al-icon{flex-shrink:0;}
.al-icon.critical{color:var(--red);}.al-icon.warning{color:var(--amber);}.al-icon.info{color:var(--cyan);}
.al-msg{color:var(--muted);word-break:break-word;}
.al-msg strong{color:var(--white);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg1);}
::-webkit-scrollbar-thumb{background:var(--border2);}
</style>
</head>

<!-- TOPBAR -->
<div class="topbar">

<div class="grid">

      <div class="sig-card"><div class="sig-header"><span class="sig-asset">BNBUSD</span><span class="sig-badge idle">—</span></div><div class="sig-payout" id="sb1">—</div><div class="sig-detail" id="sd1"></div></div>
      <div class="sig-card"><div class="sig-header"><span class="sig-asset">BTCUSD</span><span class="sig-badge idle">—</span></div><div class="sig-payout" id="sb2">—</div><div class="sig-detail" id="sd2"></div></div>
      <div class="sig-card"><div class="sig-header"><span class="sig-asset">ETHUSD</span><span class="sig-badge idle">—</span></div><div class="sig-payout" id="sb3">—</div><div class="sig-detail" id="sd3"></div></div>

  <!-- RIGHT TOP: Trades -->

<script>
// ── State ──────────────────────────────────────────────────
let pnlChart = null, pnlHistory = []
let tickerItems = [
  ['BTC',79600,78500], ['BNB',62700,62000], ['ETH',3100,3080],
  ['SOL',145,140], ['DOGE',0.16,0.155], ['AAPL',198,196],
  ['TSLA',265,260], ['NVDA',880,870], ['MSTR',1450,1420],
  ['SPX',5432,5400], ['VIX',14.5,15.0], ['OI',39800,39700]
]

// ── Helpers ────────────────────────────────────────────────
const $ = id => document.getElementById(id)
const fmt = (n,d=2) => (n??0).toFixed(d)
const fmtTime = ts => new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})
const timeAgo = ts => {const s=Math.floor((Date.now()-new Date(ts))/1000);return s<60?s+'s':s<3600?Math.floor(s/60)+'m':Math.floor(s/3600)+'h'}
const pnlCol = v => v>0?'var(--green)':v<0?'var(--red)':'var(--muted)'

function clockTick(){
  const d=new Date();$('clock').textContent=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})
}
setInterval(clockTick,1000);clockTick()

// ── Ticker ─────────────────────────────────────────────────
function buildTicker(){
  let html=''
  for(let r=0;r<2;r++)tickerItems.forEach(t=>{
    const chg=((t[1]-t[2])/t[2]*100).toFixed(2)
    html+=`<div class="tick"><span class="tick-sym">${t[0]}</span><span>${t[1].toLocaleString()}</span><span class="${chg>0?'up':'dn'}">${chg>0?'+':''}${chg}%</span></div>`
  })
  $('tickerStrip').innerHTML=html
}
buildTicker();setInterval(buildTicker,5000)

// ── Bot Controls ───────────────────────────────────────────
async function control(action){
  try{await fetch(`https://dashboard.zak-dev-ai.deno.net/${action}`,{method:'POST'})}catch(e){}
  setTimeout(loadAll,2000)
}

// ── Load & Render ─────────────────────────────────────────
async function loadAll(){
  try{
    const [state, trades, signals, alerts, agents] = await Promise.all([
      db.from('bot_state').select('*').eq('id',1).single(),
      db.from('trades').select('*').order('ts',{ascending:false}).limit(20),
      db.from('signals').select('*').order('ts',{ascending:false}).limit(50),
      db.from('alerts').select('*').order('ts',{ascending:false}).limit(30),
      db.from('agent_status').select('*')
    ])
    if(state.data)renderState(state.data)
    if(trades.data)renderTrades(trades.data)
    if(signals.data)renderSignals(signals.data)
    if(alerts.data)renderAlerts(alerts.data)
    if(agents.data)renderAgents(agents.data)
  }catch(e){$('statusMsg').textContent='DB Error: '+e.message}
}

function renderState(s){
  $('bankroll').textContent='$'+fmt(s.current_bankroll)
  $('bankrollHint').textContent='started $'+fmt(s.bankroll)
  const pnl=s.total_pnl??0
  $('totalPnl').textContent=(pnl>=0?'+':'')+'$'+fmt(pnl)
  $('totalPnl').style.color=pnlCol(pnl)
  const wr=s.total_trades>0?((s.total_wins/s.total_trades)*100).toFixed(1):'—'
  $('winRate').textContent=wr+'%'
  $('winRateHint').textContent=(s.total_wins||0)+'/'+(s.total_trades||0)
  $('totalTrades').textContent=s.total_trades||0
  $('statusMsg').textContent=s.status_message||'—'
  $('hbTime').textContent=s.last_heartbeat?timeAgo(s.last_heartbeat)+' ago':'—'
}

function renderSignals(signals){
  if(!signals.length){$('sigCount').textContent='0';return}
  $('sigCount').textContent=signals.length
  const byAsset={}
  signals.forEach(s=>{
    const asset=s.market_id||'POLY'
    if(!byAsset[asset]||new Date(s.ts)>new Date(byAsset[asset].ts))byAsset[asset]=s
  })
  const assets=['BNBUSD','BTCUSD','ETHUSD']
  let bestEdge=0,bestAsset=''
  assets.forEach((a,i)=>{
    const s=byAsset[a]
    const payout=document.getElementById('sb'+(i+1))
    const detail=document.getElementById('sd'+(i+1))
    const badge=document.querySelector(`#signalGrid .sig-card:nth-child(${i+1}) .sig-badge`)
    if(s){
      const edge=Math.abs(s.net_score||0)
      if(edge>bestEdge&&s.tradeable){bestEdge=edge;bestAsset=a}
      payout.textContent=edge>=3.5?edge.toFixed(2)+'x':edge.toFixed(2)+'x'
      payout.style.color=edge>=3.5?'var(--green)':edge>=2?'var(--amber)':'var(--muted)'
      if(badge){
        badge.textContent=s.tradeable?'TRADEABLE':s.confidence||'IDLE'
        badge.className='sig-badge '+(s.tradeable?'tradeable':s.direction==='SKIP'?'idle':'tradeable')
      }
      detail.innerHTML='<span>'+(s.direction||'—')+'</span><span>'+(s.confidence||'—')+'</span><span>net '+fmt(s.net_score||0,1)+'</span>'+(s.btc_price?'<span>$'+Math.round(s.btc_price)+'</span>':'')
    }else{
      payout.textContent='—'
      if(badge){badge.textContent='—';badge.className='sig-badge idle'}
      detail.innerHTML=''
    }
  })
  if(bestEdge>=3.5){
    $('bestEdge').textContent=bestEdge.toFixed(2)+'x'
    $('bestEdgeAsset').textContent=bestAsset
  }else if(bestEdge>0){
    $('bestEdge').textContent=bestEdge.toFixed(2)+'x'
    $('bestEdgeAsset').textContent=bestAsset+' (below 3.5x)'
  }
}

function renderTrades(trades){
  if(!trades.length){$('tradesList').innerHTML='<div class="empty-t">No trades yet</div>';$('tradeCount').textContent='0';return}
  $('tradeCount').textContent=trades.length
  $('tradesList').innerHTML=trades.map(t=>{
    const side=t.side||t.direction||'?'
    const isPos=['YES','UP','Bull'].includes(side)
    return `<div class="tr"><span class="tr-time">${fmtTime(t.ts)}</span><span class="tr-asset">${(t.market_id||'').slice(0,6)}</span><span class="tr-side ${side}">${side}</span><span class="tr-size">$${fmt(t.size_usdc)}</span><span class="tr-pnl ${t.pnl>0?'pos':'neg'}">${t.pnl!==null?(t.pnl>=0?'+':'')+'$'+fmt(t.pnl):'—'}</span><span class="tr-edge">${t.price_target?fmt(t.price_target,2)+'x':'—'}</span></div>`
  }).join('')
}

function renderAlerts(alerts){
  if(!alerts.length){$('alertsList').innerHTML='';$('alertCount').textContent='0';return}
  $('alertCount').textContent=alerts.length
  $('alertsList').innerHTML=alerts.map(a=>{
    const lvl=a.level||'info'
    return `<div class="al"><span class="al-time">${fmtTime(a.ts)}</span><span class="al-icon ${lvl}">●</span><span class="al-msg">${a.message}</span></div>`
  }).join('')
}

function renderAgents(agents){
  if(!agents.length){$('agentsList').innerHTML='<div class="agrow"><span class="agname">—</span></div>';return}
  $('agentsList').innerHTML=agents.map(a=>
    `<div class="agrow"><span class="agname">${a.agent_name||'bot'}</span><span class="agst ${a.status||'idle'}">${a.status||'—'}</span></div>`
  ).join('')
}

// ── P&L Chart ──────────────────────────────────────────────
function updatePnlChart(trades){
  const canvas=$('pnlChart')
  const closed=trades.filter(t=>t.pnl!==null).reverse()
  if(!closed.length){if(pnlChart){pnlChart.destroy();pnlChart=null}return}
  let cum=0;const data=closed.map(t=>{cum+=t.pnl;return{cumPnl:parseFloat(cum.toFixed(2)),t:fmtTime(t.ts)}})
  const labels=data.map(d=>d.t),values=data.map(d=>d.cumPnl)
  if(pnlChart){pnlChart.data.labels=labels;pnlChart.data.datasets[0].data=values;pnlChart.update('none');return}
  pnlChart=new Chart(canvas,{type:'line',data:{labels,datasets:[{data,backgroundColor:'rgba(0,229,255,0.04)',borderColor:'#00e5ff',borderWidth:1.5,pointRadius:0,tension:0.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+ctx.parsed.y.toFixed(2)}}},scales:{x:{ticks:{color:'#1f3d4d',font:{size:9}},grid:{display:false}},y:{ticks:{color:'#1f3d4d',font:{size:9},callback:v=>'$'+v.toFixed(1)},grid:{color:'#0f2d3a'}}}}})
}

// ── Boot ───────────────────────────────────────────────────
loadAll()
setInterval(loadAll, 15000)
</script>
